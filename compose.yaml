services:
  abeonasec-ui:
    container_name: abeonasec-ui
    build: # Build container using aboenasec-ui.Dockerfile
      context: .
      dockerfile: abeonasec-ui.Dockerfile
    ports:
    - "9080:9080" # serve on http://{Host IP}:9080 for testing (80 for prod)
    networks:
    - external # using external name for containers bound to Host
    - internal # using internal name for Pod

  # example from https://ikarthiks.medium.com/setting-up-elasticsearch-and-kibana-single-node-with-docker-compose-329776fa3aee
  # note that we are setting up certificates regardless of the fact that this service is internal to the Pod network
  elastic-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch-wolfi:9.3.0
    volumes:
      - certs:./abeonasec-es/certs
    user: root # required for generating and setting ownership of certs with following shell script
    command: >
      bash -c '
        if [ x${ELASTIC_PASSWORD} == x ]; then
          echo "Set the ELASTIC_PASSWORD environment variable in the .env file";
          exit 1;
        fi;
        if [ ! -d "../abeonasec-es/certs" ]; then
          mkdir -p "../abeonasec-es/certs" 
        fi;
        if [ ! -f abeonasec-es/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out abeonasec-es/certs/ca.zip;
          unzip abeonasec-es/certs/ca.zip -d abeonasec-es/certs;
        fi;
        if [ ! -f abeonasec-es/certs/certs.zip ]; then
          echo "Creating certs";
          echo -ne \
          "instances:\n"\
          "  - name: abeonasec-es01\n"\
          "    dns:\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          > abeonasec-es/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out abeonasec-es/certs/certs.zip --in abeonasec-es/certs/instances.yml --ca-cert abeonasec-es/certs/ca/ca.crt --ca-key abeonasec-es/certs/ca/ca.key;
          unzip abeonasec-es/certs/certs.zip -d abeonasec-es/certs;
        fi;
        echo "Setting file permissions"
        chown -R root:root abeonasec/certs;
        find . -type d -exec chmod 750 \{\} \;;
        find . -type f -exec chmod 640 \{\} \;;
        echo "Waiting for Elasticsearch availability";
        until curl -s --cacert abeonasec/certs/ca/ca.crt https://localhost:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
        echo "All done!";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f abeonasec/certs/abeonasec-es01/abeonasec-es01.crt ]"]
      interval: 1s
      timeout: 5s
      retries: 120

  abeonasec-es01: # single node elasticsearch cluster
    container_name: abeonasec-es01
    image: docker.elastic.co/elasticsearch/elasticsearch-wolfi:9.3.0
    volumes:
    - data:./abeonasec-es/data
    - certs:./abeonasec-es/certs
    ports:
    - "9200" # default elasticsearch port
    networks:
    - internal # internal to Pod
    environment:
    - node.name=abeonasec-es01
    - discovery.type=single-node
    - cluster.name=abeonasec-es-cluster
    - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    - bootstrap.memory_lock=true
    - xpack.security.enabled=true
    - xpack.security.http.ssl.enabled=true
    - xpack.security.http.ssl.key=certs/abeonasec-es01/abeonasec-es01.key
    - xpack.security.http.ssl.certificate=certs/abeonasec-es01/abeonasec-es01.crt
    - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
    - xpack.security.transport.ssl.enabled=true
    - xpack.security.transport.ssl.key=certs/abeonasec-es01/abeonasec-es01.key
    - xpack.security.transport.ssl.certificate=certs/abeonasec-es01/abeonasec-es01.crt
    - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
    - xpack.security.transport.ssl.verification_mode=certificate
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  # elasticvue for development purposes
  DEV-abeonasec-elasticvue:
    container_name: DEV-abeonasec-elasticvue
    image: docker.io/cars10/elasticvue:latest
    ports:
    - "9199:9199" # exposed to host for viewing
    environment:
    - ELASTICVUE_CLUSTERS='[{"name":"prod cluster", "uri":"https://localhost:9200", "username":"elastic", "password":"$ELASTIC_PASSWORD"}]'
    networks:
    - external
    depends_on:
    - abeonasec-es01

volumes:
  ui:
    driver: local
  data:
    driver: local
  certs:
    driver: local

networks:
  internal: {}
  external: {}